name: PR Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Deploy PR preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: npm ci

      - name: Run unit tests
        if: github.event.action != 'closed'
        run: npm test

      - name: Prepare static site
        if: github.event.action != 'closed'
        run: |
          mkdir -p _site
          VER=$(git rev-parse --short HEAD)
          sed "s|src/app/main.js|src/app/main.js?v=${VER}|" index.html > _site/index.html
          cp -r src _site/
          if [ -d assets ]; then cp -r assets _site/; fi
          find _site/src -name '*.js' -print0 | while IFS= read -r -d '' f; do
            sed -i -E "s|from ([\"'])((\.\.?/[^\"'?]+))(\1)|from \1\2?v=${VER}\4|g" "$f"
          done
          touch _site/.nojekyll

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./_site
          preview-branch: gh-pages
          qr-code: true
          wait-for-pages-deployment: false
