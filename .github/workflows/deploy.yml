name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Check app script syntax
        run: node --check src/app/main.js

  deploy:
    name: Deploy to GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p _site
          VER=$(git rev-parse --short HEAD)
          sed "s|src/app/main.js|src/app/main.js?v=${VER}|" index.html > _site/index.html
          cp -r src _site/
          find _site/src -name '*.js' -print0 | while IFS= read -r -d '' f; do
            sed -i -E "s|from ([\"'])((\.\.?/[^\"'?]+))(\1)|from \1\2?v=${VER}\4|g" "$f"
          done
          touch _site/.nojekyll

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          branch: gh-pages
          clean: false
          clean-exclude: pr-preview/
          force: false
          commit-message: Deploy production site from ${{ github.sha }}
